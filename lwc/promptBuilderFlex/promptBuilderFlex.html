<template>
    <lightning-spinner alternative-text="Loading" size="medium" if:true={isLoading}></lightning-spinner>
    <template if:true={isModalOpen}>
        <section class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <h2 class="slds-text-heading_medium">New Prompt Template</h2>
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" 
                            title="Close" onclick={handleCloseModal}>
                        <lightning-icon icon-name="utility:close" alternative-text="close" variant="bare"></lightning-icon>
                    </button>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-combobox 
                        label="Prompt Template Type"
                        required 
                        value={selectedTemplateType}
                        placeholder="Select a template type"
                        options={templateTypeOptions}
                        onchange={handlePromptTemplateType}>
                    </lightning-combobox>

                    <template if:true={isFlexTemplate}>
                        <h3 class="slds-text-heading_small slds-p-top_medium">Define Sources (Up to 5)</h3>
                        <template for:each={resources} for:item="resource">
                            <div key={resource.id} class="slds-grid slds-grid_align-spread slds-p-vertical_small">
                                <div class="slds-col slds-size_1-of-4">
                                    <lightning-input 
                                        label="Name" 
                                        value={resource.name} 
                                        required 
                                        data-id={resource.id} 
                                        onchange={handleResourceChange}>
                                    </lightning-input>
                                </div>
                                <div class="slds-col slds-size_1-of-4">
                                    <lightning-input 
                                        label="API Name" 
                                        value={resource.apiName} 
                                        required 
                                        data-id={resource.id} 
                                        onchange={handleResourceChange}>
                                    </lightning-input>
                                </div>
                                <div class="slds-col slds-size_1-of-4">
                                    <lightning-combobox 
                                        label="Source Type" 
                                        value={resource.sourceType} 
                                        options={sourceTypeOptions} 
                                        required 
                                        data-id={resource.id} 
                                        onchange={handleResourceChange}>
                                    </lightning-combobox>
                                </div>
                                <div class="slds-col slds-size_1-of-4">
                                    <lightning-combobox 
                                        label="Object" 
                                        value={resource.object} 
                                        options={objectOptions} 
                                        required 
                                        data-id={resource.id} 
                                        onchange={handleResourceChange}>
                                    </lightning-combobox>
                                </div>
                                <div class="slds-col slds-shrink-none">
                                    <lightning-button-icon 
                                        icon-name="utility:delete" 
                                        alternative-text="Remove" 
                                        onclick={removeResource} 
                                        data-id={resource.id}>
                                    </lightning-button-icon>
                                </div>
                            </div>
                        </template>
                        <lightning-button label="Add Resource" onclick={addResource} 
                            class="slds-m-top_medium" 
                            variant="neutral" 
                            disabled={disableAddResource}>
                        </lightning-button>
                    </template>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={handleCloseModal}></lightning-button>
                    <lightning-button label="Next" variant="brand" onclick={handleNextClick}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
